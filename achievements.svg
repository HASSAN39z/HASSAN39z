<svg width="900" height="160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="cardgrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2a1f"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,255,200,0.05)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="900" height="160" fill="url(#bg)"/>
  <rect width="900" height="160" fill="url(#grid)"/>

  <!-- Card 1: Total Commits -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.1s" fill="freeze"/>
    <rect x="20" y="20" width="190" height="120" rx="8" fill="url(#cardgrad)" stroke="#00ffcc" stroke-width="1" stroke-opacity="0.4"/>
    <text x="115" text-anchor="middle" y="55" font-family="'Courier New', monospace" font-size="11" fill="#00ffcc" opacity="0.7" letter-spacing="1">TOTAL COMMITS</text>
    <text x="115" text-anchor="middle" y="95" font-family="'Courier New', monospace" font-size="32" font-weight="bold" fill="#00ffcc" filter="url(#glow)">725+</text>
    <text x="115" text-anchor="middle" y="120" font-family="'Courier New', monospace" font-size="10" fill="#666666">since Jan 2022</text>
  </g>

  <!-- Card 2: Streak -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.25s" fill="freeze"/>
    <rect x="228" y="20" width="190" height="120" rx="8" fill="url(#cardgrad)" stroke="#00ffcc" stroke-width="1" stroke-opacity="0.4"/>
    <text x="323" text-anchor="middle" y="55" font-family="'Courier New', monospace" font-size="11" fill="#00ffcc" opacity="0.7" letter-spacing="1">LONGEST STREAK</text>
    <text x="323" text-anchor="middle" y="95" font-family="'Courier New', monospace" font-size="32" font-weight="bold" fill="#00ffcc" filter="url(#glow)">14 days</text>
    <text x="323" text-anchor="middle" y="120" font-family="'Courier New', monospace" font-size="10" fill="#666666">Jan 5 – Jan 18</text>
  </g>

  <!-- Card 3: Stack -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.4s" fill="freeze"/>
    <rect x="436" y="20" width="190" height="120" rx="8" fill="url(#cardgrad)" stroke="#00ffcc" stroke-width="1" stroke-opacity="0.4"/>
    <text x="531" text-anchor="middle" y="55" font-family="'Courier New', monospace" font-size="11" fill="#00ffcc" opacity="0.7" letter-spacing="1">SPECIALIZATION</text>
    <text x="531" text-anchor="middle" y="88" font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="#00ffcc" filter="url(#glow)">MERN Stack</text>
    <text x="531" text-anchor="middle" y="110" font-family="'Courier New', monospace" font-size="13" fill="#00ffcc" opacity="0.8">+ AI/LLM Apps</text>
    <text x="531" text-anchor="middle" y="128" font-family="'Courier New', monospace" font-size="11" fill="#00ffcc" opacity="0.6">React Native</text>
  </g>

  <!-- Card 4: Experience -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.55s" fill="freeze"/>
    <rect x="644" y="20" width="236" height="120" rx="8" fill="url(#cardgrad)" stroke="#00ffcc" stroke-width="1" stroke-opacity="0.4"/>
    <text x="762" text-anchor="middle" y="55" font-family="'Courier New', monospace" font-size="11" fill="#00ffcc" opacity="0.7" letter-spacing="1">EXPERIENCE</text>
    <text x="762" text-anchor="middle" y="95" font-family="'Courier New', monospace" font-size="32" font-weight="bold" fill="#00ffcc" filter="url(#glow)">3+ Years</text>
    <text x="762" text-anchor="middle" y="120" font-family="'Courier New', monospace" font-size="10" fill="#666666">Full-Stack Dev</text>
  </g>

  <!-- Pulsing border on all cards -->
  <rect x="20" y="20" width="190" height="120" rx="8" fill="none" stroke="#00ffcc" stroke-width="1.5" stroke-opacity="0">
    <animate attributeName="stroke-opacity" values="0;0.6;0" dur="3s" begin="1s" repeatCount="indefinite"/>
  </rect>
  <rect x="228" y="20" width="190" height="120" rx="8" fill="none" stroke="#00ffcc" stroke-width="1.5" stroke-opacity="0">
    <animate attributeName="stroke-opacity" values="0;0.6;0" dur="3s" begin="1.75s" repeatCount="indefinite"/>
  </rect>
  <rect x="436" y="20" width="190" height="120" rx="8" fill="none" stroke="#00ffcc" stroke-width="1.5" stroke-opacity="0">
    <animate attributeName="stroke-opacity" values="0;0.6;0" dur="3s" begin="2.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="644" y="20" width="236" height="120" rx="8" fill="none" stroke="#00ffcc" stroke-width="1.5" stroke-opacity="0">
    <animate attributeName="stroke-opacity" values="0;0.6;0" dur="3s" begin="3.25s" repeatCount="indefinite"/>
  </rect>
</svg>
