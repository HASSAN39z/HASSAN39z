<svg width="900" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <!-- Cyan glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle glow for grid lines -->
    <filter id="gridglow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Scanline pattern -->
    <pattern id="scanlines" x="0" y="0" width="900" height="4" patternUnits="userSpaceOnUse">
      <rect width="900" height="1" fill="rgba(0,255,200,0.03)"/>
    </pattern>
    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,255,200,0.06)" stroke-width="0.5"/>
    </pattern>
    <!-- Radial glow behind text -->
    <radialGradient id="textglow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#00ffcc;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)"/>
  <!-- Grid overlay -->
  <rect width="900" height="200" fill="url(#grid)" filter="url(#gridglow)"/>
  <!-- Scanlines overlay -->
  <rect width="900" height="200" fill="url(#scanlines)"/>
  <!-- Radial glow -->
  <rect width="900" height="200" fill="url(#textglow)"/>

  <!-- Animated corner brackets -->
  <!-- Top-left -->
  <polyline points="20,40 20,15 45,15" fill="none" stroke="#00ffcc" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.2s" fill="freeze"/>
  </polyline>
  <!-- Top-right -->
  <polyline points="880,40 880,15 855,15" fill="none" stroke="#00ffcc" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.2s" fill="freeze"/>
  </polyline>
  <!-- Bottom-left -->
  <polyline points="20,160 20,185 45,185" fill="none" stroke="#00ffcc" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.2s" fill="freeze"/>
  </polyline>
  <!-- Bottom-right -->
  <polyline points="880,160 880,185 855,185" fill="none" stroke="#00ffcc" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.2s" fill="freeze"/>
  </polyline>

  <!-- Horizontal accent lines -->
  <line x1="0" y1="1" x2="900" y2="1" stroke="#00ffcc" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.1;0.6;0.1" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="0" y1="199" x2="900" y2="199" stroke="#00ffcc" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.1;0.6;0.1" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </line>

  <!-- Floating particles -->
  <circle cx="80" cy="50" r="1.5" fill="#00ffcc" opacity="0.4">
    <animate attributeName="cy" values="50;30;50" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="150" r="1" fill="#00ffcc" opacity="0.3">
    <animate attributeName="cy" values="150;130;150" dur="3.5s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.5s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="30" r="1.5" fill="#00ffcc" opacity="0.2">
    <animate attributeName="cy" values="30;20;30" dur="5s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="160" r="1" fill="#00ffcc" opacity="0.3">
    <animate attributeName="cy" values="160;175;160" dur="4.2s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="60" r="1.2" fill="#00ffcc" opacity="0.25">
    <animate attributeName="cx" values="750;760;750" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.25;0.6;0.25" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Prompt symbol -->
  <text x="60" y="88" font-family="'Courier New', monospace" font-size="22" fill="#00ffcc" opacity="0" filter="url(#glow)">
    &gt;
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.3s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" begin="1s" repeatCount="indefinite"/>
  </text>

  <!-- Main name — letter by letter reveal -->
  <text font-family="'Courier New', monospace" font-size="48" font-weight="bold" fill="#00ffcc" filter="url(#glow)" letter-spacing="4">
    <tspan x="450" text-anchor="middle" y="105" opacity="0">
      Muhammad Hassan
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.6s" fill="freeze"/>
    </tspan>
  </text>

  <!-- Subtitle -->
  <text x="450" text-anchor="middle" y="140" font-family="'Courier New', monospace" font-size="14" fill="#888888" letter-spacing="3" opacity="0">
    FULL-STACK MERN  ·  REACT NATIVE  ·  AI INTEGRATOR
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.1s" fill="freeze"/>
  </text>

  <!-- Blinking cursor after name -->
  <rect x="700" y="80" width="3" height="35" fill="#00ffcc" opacity="1">
    <animate attributeName="opacity" values="1;0;1" dur="0.9s" begin="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0" dur="1.1s" begin="0s" fill="freeze"/>
  </rect>

  <!-- Bottom status line -->
  <text x="60" y="185" font-family="'Courier New', monospace" font-size="10" fill="#00ffcc" opacity="0" letter-spacing="1">
    STATUS: AVAILABLE FOR OPPORTUNITIES
    <animate attributeName="opacity" values="0;0.7" dur="0.4s" begin="1.4s" fill="freeze"/>
  </text>
  <text x="840" text-anchor="end" y="185" font-family="'Courier New', monospace" font-size="10" fill="#00ffcc" opacity="0" letter-spacing="1">
    v2.0.26
    <animate attributeName="opacity" values="0;0.7" dur="0.4s" begin="1.4s" fill="freeze"/>
  </text>
</svg>
