<svg width="900" height="80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,255,200,0.06)" stroke-width="0.5"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="80" fill="url(#bg)"/>
  <rect width="900" height="80" fill="url(#grid)"/>
  <line x1="0" y1="1" x2="900" y2="1" stroke="#00ffcc" stroke-width="1.5" opacity="0.5"/>
  <text x="450" text-anchor="middle" y="46" font-family="'Courier New', monospace" font-size="14" fill="#00ffcc" filter="url(#glow)" letter-spacing="2">
    &lt; Let's build something amazing together 🚀 /&gt;
  </text>
  <line x1="0" y1="79" x2="900" y2="79" stroke="#00ffcc" stroke-width="1.5" opacity="0.5"/>
</svg>
